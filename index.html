<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Journal — Choose Your Own Adventure for Real Decisions</title>
<meta name="description" content="Map out your real-life decisions as a Choose Your Own Adventure book. Explore branching paths, weigh tradeoffs, and see where each choice leads.">
<link rel="icon" href="/cyoa-cover.png" type="image/png">
<link rel="canonical" href="https://cyoa-journal.vercel.app/">
<meta property="og:title" content="Decision Journal">
<meta property="og:description" content="Map out your real-life decisions as a Choose Your Own Adventure book.">
<meta property="og:image" content="/cyoa-cover.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=Inknut+Antiqua:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<main>
  <div class="book" id="book">
    <div class="cover-curl" id="cover-curl" data-action="go-shelf" title="Back to all decisions"></div>
    <div class="dog-ear"></div>
    <div class="bookmarks" id="bookmarks"></div>
    <div class="page-inner" id="page"></div>
  </div>
</main>

<div class="modal-overlay" id="modal" style="display:none" role="dialog" aria-label="New decision">
  <div class="modal">
    <h2 id="modal-heading">New Decision</h2>
    <label for="modal-title">What decision are you facing?</label>
    <input type="text" id="modal-title" placeholder="Should I take the job at StartupCo?">
    <div class="modal-actions">
      <button class="btn" data-action="close-modal">Cancel</button>
      <button class="btn btn-primary" data-action="create-journal">Begin</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="ai-modal" style="display:none" role="dialog" aria-label="Explore with AI">
  <div class="modal">
    <h2>Explore with AI</h2>
    <div id="ai-modal-content"></div>
    <div class="modal-actions" style="margin-top:20px;">
      <button class="btn" data-action="close-ai-modal">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="share-modal" style="display:none" role="dialog" aria-label="Share decision">
  <div class="modal">
    <h2>Share This Decision</h2>
    <div id="share-modal-content"></div>
    <div class="modal-actions" style="margin-top:20px;">
      <button class="btn" data-action="close-share-modal">Done</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
